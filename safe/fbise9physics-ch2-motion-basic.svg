<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">

  <defs>
    <pattern id="grid" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M8 0 L0 0 0 8" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="500" fill="#0b1a3a"/>
  <rect x="0" y="0" width="500" height="500" fill="url(#grid)"/>

  <!-- Ground Line -->
  <line x1="60" y1="333" x2="440" y2="333" stroke="white" stroke-width="1"/>

  <!-- Reference Point -->
  <circle cx="90" cy="333" r="4" fill="white"/>
  <text x="100" y="328" fill="white" font-family="monospace" font-size="16">
    Reference Point
  </text>

  <!-- Time Markers -->
  <line x1="150" y1="70" x2="150" y2="333" stroke="white" stroke-width="1" stroke-dasharray="6,6"/>
  <line x1="250" y1="70" x2="250" y2="333" stroke="white" stroke-width="1" stroke-dasharray="6,6"/>
  <line x1="350" y1="70" x2="350" y2="333" stroke="white" stroke-width="1" stroke-dasharray="6,6"/>

  <text x="140" y="50" fill="white" font-family="monospace" font-size="18">t₁</text>
  <text x="240" y="50" fill="white" font-family="monospace" font-size="18">t₂</text>
  <text x="340" y="50" fill="white" font-family="monospace" font-size="18">t₃</text>

  <!-- Arrow at t₁ (Left) -->
  <line x1="120" y1="293" x2="170" y2="293" stroke="white" stroke-width="1"/>
  <polygon points="170,293 162,289 162,297" fill="white"/>

  <!-- Arrow at t₂ (Center) -->
  <line x1="220" y1="293" x2="270" y2="293" stroke="white" stroke-width="1"/>
  <polygon points="270,293 262,289 262,297" fill="white"/>

  <!-- Arrow at t₃ (Right) -->
  <line x1="320" y1="293" x2="370" y2="293" stroke="white" stroke-width="1"/>
  <polygon points="370,293 362,289 362,297" fill="white"/>

  <!-- Measurement Lines -->
  <line x1="90" y1="360" x2="145" y2="360" stroke="white" stroke-width="1"/>
  <line x1="90" y1="355" x2="90" y2="365" stroke="white" stroke-width="1"/>
  <line x1="145" y1="355" x2="145" y2="365" stroke="white" stroke-width="1"/>

  <line x1="90" y1="375" x2="245" y2="375" stroke="white" stroke-width="1"/>
  <line x1="245" y1="370" x2="245" y2="380" stroke="white" stroke-width="1"/>

  <line x1="90" y1="390" x2="345" y2="390" stroke="white" stroke-width="1"/>
  <line x1="345" y1="385" x2="345" y2="395" stroke="white" stroke-width="1"/>

  <!-- Caption -->
  <text x="250" y="440" text-anchor="middle" fill="white" font-family="monospace" font-size="18">
    Position changes with time.
  </text>
  <text x="250" y="465" text-anchor="middle" fill="white" font-family="monospace" font-size="18">
    Object is in Motion.
  </text>

  <!-- Watermark -->
  <text x="420" y="485" fill="white" font-family="monospace" font-size="12" opacity="0.4">
    taleem.help
  </text>

</svg>