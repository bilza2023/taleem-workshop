<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Taleem Player</title>

  <!-- Player Styles -->
  <link rel="stylesheet" href="./player/css/app/app.css" />
  <link rel="stylesheet" href="./player/taleem-player-app.css" />
  <link rel="stylesheet" href="./player/css/themes/default.css" />

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: system-ui, sans-serif;
    }
    .load-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 1.2rem;
}

.load-screen button {
  padding: 0.9rem 2.2rem;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.4px;

  background: linear-gradient(145deg, #1e1e1e, #161616);
  color: white;

  border: 1px solid #2a2a2a;
  border-radius: 8px;

  cursor: pointer;

  transition: all 0.18s ease;
  box-shadow:
    0 4px 14px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

.load-screen button:hover {
  transform: translateY(-2px);
  border-color: #3a3a3a;
  box-shadow:
    0 6px 20px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

.load-screen button:active {
  transform: translateY(0);
  box-shadow:
    0 2px 8px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.03);
}

    #app {
      display: none;
    }

    .nav-test {
      display: none;
    }
  </style>
</head>

<body>

  <!-- Load Screen -->
  <div class="load-screen">
    <button id="openBtn">Load Deck</button>
    <input type="file" id="fileInput" accept=".json" hidden />
  </div>

  <!-- Player Mount -->
  <div id="app"></div>

  <!-- Player Controls -->
  <div class="nav-test">
    <button id="play-btn">▶</button>
    <button id="pause-btn">⏸</button>
    <button id="stop-btn">⏹</button>
    <span id="time">0.0s</span>
    <div class="scrub-wrap">
      <input id="scrub" type="range" min="0" max="1" step="0.1" />
    </div>
  </div>
  <script src="./index.js" type="module" ></script>
</body>
</html>
